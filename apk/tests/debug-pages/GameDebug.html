<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Game Debug</title>
  <style>
    :root { --bg:#0b1220; --panel:#121b2f; --line:#2a3653; --text:#dbe7ff; --muted:#92a4c8; --accent:#56b2ff; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; overflow: hidden; font-family: Consolas, "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); }
    .debug-toggle { position: fixed; top: 10px; right: 10px; z-index: 20; min-width: 112px; padding: 0 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.24); }
    .debug-panel { position: fixed; top: 0; left: 0; right: 0; z-index: 15; max-height: min(420px, calc(100vh - 16px)); padding: 48px 10px 10px; border-bottom: 1px solid var(--line); box-shadow: 0 18px 40px rgba(0,0,0,0.38); background: linear-gradient(180deg,rgba(22,33,58,0.98),rgba(17,25,45,0.96)); overflow: auto; }
    body.debug-panel-collapsed .debug-panel { display: none; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 8px; }
    label { font-size: 12px; color: var(--muted); }
    select, input, button { height: 30px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); color: var(--text); padding: 0 8px; }
    button { background: #1c2a47; cursor: pointer; }
    button:hover { border-color: var(--accent); }
    .status { font-size: 12px; color: #a9bee6; white-space: pre-wrap; }
    .game-wrap { width: 100vw; height: 100vh; }
    iframe { display: block; width: 100%; height: 100%; border: 0; background: #000; }
    .toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text); }
    input[type="checkbox"] { width: 16px; height: 16px; padding: 0; accent-color: var(--accent); }
  </style>
</head>
<body class="debug-panel-collapsed">
  <button id="debugPanelToggle" class="debug-toggle" type="button" aria-controls="debugPanel" aria-expanded="false">显示调试栏</button>
  <div id="debugPanel" class="debug-panel">
    <div class="row">
      <label>群系</label>
      <select id="biome">
        <option>forest</option><option>cherry_grove</option><option>snow</option><option>desert</option>
        <option>mushroom_island</option><option>mountain</option><option>cave</option><option>ocean</option><option>volcano</option>
        <option>nether</option><option>deep_dark</option><option>end</option><option>sky_dimension</option>
      </select>
      <button id="btnBiome">切换群系</button>
      <label>轮次</label>
      <input id="biomeRound" type="number" value="1" min="1" step="1">
      <button id="btnBiomeRound">设置轮次</button>
      <label>分数</label>
      <input id="score" type="number" value="0" min="0" step="100">
      <button id="btnScore">设置分数</button>
      <label>BOSS</label>
      <select id="boss"><option value="wither">&#x51CB;&#x7075;</option><option value="ghast">&#x6076;&#x9B42;</option><option value="blaze">&#x70C8;&#x7130;&#x4EBA;</option><option value="wither_skeleton">&#x51CB;&#x7075;&#x9AB7;&#x9AC5;</option><option value="warden">&#x575A;&#x5B88;&#x8005;</option><option value="ravager">&#x63A0;&#x593A;&#x517D;</option><option value="ender_dragon">&#x672B;&#x5F71;&#x9F99;</option></select>
      <button id="btnBoss">触发BOSS（正常关卡）</button>
      <button id="btnBossGate">触发BOSS（门禁模式）</button>
      <label>阶段</label>
      <select id="bossPhase">
        <option value="1">P1</option>
        <option value="2">P2</option>
        <option value="3" selected>P3</option>
      </select>
      <button id="btnBossPhase">设置BOSS阶段</button>
      <button id="btnEnderDragon">末影龙竞技场</button>
      <label class="toggle"><input id="dragonProjectileCrystals" type="checkbox" checked>投射物可打碎末影龙水晶</label>
      <button id="btnVillage">生成村庄</button>
      <button id="btnGod">无敌: OFF</button>
    </div>
    <div class="row">
      <label>敌人</label>
      <select id="enemy">
        <option>zombie</option><option>skeleton</option><option>creeper</option><option>spider</option><option>enderman</option>
        <option>drowned</option><option>guardian</option><option>pufferfish</option>
        <option>piglin</option><option>bee</option><option>fox</option><option>spore_bug</option>
        <option>magma_cube</option><option>fire_spirit</option><option>sculk_worm</option><option>shadow_stalker</option>
      </select>
      <button id="btnEnemy">生成敌人</button>
      <label>挑战</label>
      <select id="challengeMode">
        <option value="long_word">长词</option>
        <option value="phrase">短语</option>
        <option value="multi_blank">双空补全</option>
      </select>
      <button id="btnChallenge">触发挑战</button>
      <label>物品</label>
      <select id="item"><option value="diamond">&#x94BB;&#x77F3;</option><option value="gunpowder">&#x70B8;&#x836F;</option><option value="ender_pearl">&#x672B;&#x5F71;&#x73CD;&#x73E0;</option><option value="dragon_egg">&#x9F99;&#x86CB;</option><option value="string">&#x8718;&#x86DB;&#x4E1D;</option><option value="bow">&#x5F13;</option><option value="arrow">&#x7BAD;</option><option value="totem">&#x56FE;&#x817E;</option><option value="echo_shard">&#x56DE;&#x54CD;&#x788E;&#x7247;</option><option value="sculk_vein">&#x5E7D;&#x533F;&#x83CC;&#x8109;</option><option value="emerald">&#x7EFF;&#x5B9D;&#x77F3;</option><option value="potion">&#x836F;&#x6C34;</option></select>
      <label>数量</label>
      <input id="count" type="number" value="1" min="1">
      <button id="btnItem">给予物品</button>
      <button id="btnDragonEquip">龙蛋并装备（长按攻击召唤）</button>
    </div>
    <div class="row">
      <label>合成测试</label>
      <label>倍率</label>
      <input id="craftMultiplier" type="number" value="1" min="1" step="1">
      <button id="btnCraftInjectShield">注入盾牌材料</button>
      <button id="btnCraftInjectTorch">注入火炬材料</button>
      <button id="btnCraftClear">清空合成材料</button>
      <button id="btnCraftOpen">打开合成台</button>
      <button id="btnCraftAutoShield">自动填充盾牌</button>
      <button id="btnCraftAutoTorch">自动填充火炬</button>
    </div>
    <div class="row">
      <label>合成库存</label>
      <label>木棍</label>
      <input id="craftStick" type="number" value="0" min="0" step="1">
      <label>铁块</label>
      <input id="craftIron" type="number" value="0" min="0" step="1">
      <label>火药</label>
      <input id="craftGunpowder" type="number" value="0" min="0" step="1">
      <button id="btnCraftSet">设置库存</button>
    </div>
    <div id="status" class="status">status: game iframe loading...</div>
  </div>
  <div class="game-wrap">
    <iframe id="game" src="../../Game.html"></iframe>
  </div>

  <script>
    const DEBUG_PANEL_COLLAPSED_CLASS = "debug-panel-collapsed";
    const gameFrame = document.getElementById("game");
    const statusEl = document.getElementById("status");
    const debugPanelToggleEl = document.getElementById("debugPanelToggle");
    const debugPanelEl = document.getElementById("debugPanel");
    let debugGodMode = false;
    let dragonProjectileCrystalsEnabled = true;
    let patched = false;
    let iframeLoaded = false;
    let iframeAccessError = "";
    const CRAFTING_MIN_COUNT = 0;
    const CRAFTING_MIN_MULTIPLIER = 1;
    const CRAFTING_DEFAULT_MULTIPLIER = 1;
    const CRAFTING_KEYS = {
      stick: "stick",
      iron: "iron",
      gunpowder: "gunpowder"
    };
    const CRAFTING_PRESETS = {
      shield: { stick: 2, iron: 1 },
      torch: { stick: 1, gunpowder: 1 }
    };

    function setDebugPanelCollapsed(collapsed) {
      document.body.classList.toggle(DEBUG_PANEL_COLLAPSED_CLASS, Boolean(collapsed));
      if (debugPanelToggleEl) {
        debugPanelToggleEl.innerText = collapsed ? "显示调试栏" : "隐藏调试栏";
        debugPanelToggleEl.setAttribute("aria-expanded", collapsed ? "false" : "true");
      }
      if (debugPanelEl) {
        debugPanelEl.setAttribute("aria-hidden", collapsed ? "true" : "false");
      }
    }

    function toggleDebugPanel() {
      const collapsed = document.body.classList.contains(DEBUG_PANEL_COLLAPSED_CLASS);
      setDebugPanelCollapsed(!collapsed);
    }

    async function resetDebugCaches() {
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map((registration) => registration.unregister()));
      }
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.filter((key) => key.startsWith('mmwg-')).map((key) => caches.delete(key)));
      }
    }

    async function loadFreshGameFrame() {
      statusEl.innerText = 'status: clearing service worker cache...';
      try {
        await resetDebugCaches();
      } catch (err) {
        console.warn('resetDebugCaches failed:', err);
      }
      gameFrame.src = `../../Game.html?debug_frame_ts=${Date.now()}`;
    }

    function gw() {
      const w = gameFrame && gameFrame.contentWindow ? gameFrame.contentWindow : null;
      if (!w) return null;
      try {
        void w.document;
      } catch (e) {
        iframeAccessError = String(e && e.message ? e.message : e);
        return null;
      }
      iframeAccessError = "";
      return w;
    }

    function readGameExpr(w, expr, fallback = null) {
      if (!w || typeof w.eval !== "function") return fallback;
      try {
        const value = w.eval(expr);
        return value == null ? fallback : value;
      } catch (e) {
        return fallback;
      }
    }

    function runGameExpr(w, expr) {
      if (!w || typeof w.eval !== "function") return undefined;
      return w.eval(expr);
    }

    function readNumberInput(id, fallbackValue) {
      const el = document.getElementById(id);
      if (!el) return fallbackValue;
      const value = Number(el.value);
      return Number.isFinite(value) ? value : fallbackValue;
    }

    function readCraftMultiplier() {
      const value = Math.floor(readNumberInput("craftMultiplier", CRAFTING_DEFAULT_MULTIPLIER));
      return Math.max(CRAFTING_MIN_MULTIPLIER, value || CRAFTING_DEFAULT_MULTIPLIER);
    }

    function normalizeCraftCount(value) {
      const num = Math.floor(Number(value) || 0);
      return Math.max(CRAFTING_MIN_COUNT, num);
    }

    function getCraftInventoryInputs() {
      return {
        [CRAFTING_KEYS.stick]: normalizeCraftCount(readNumberInput("craftStick", 0)),
        [CRAFTING_KEYS.iron]: normalizeCraftCount(readNumberInput("craftIron", 0)),
        [CRAFTING_KEYS.gunpowder]: normalizeCraftCount(readNumberInput("craftGunpowder", 0))
      };
    }

    function setCraftInventoryInputs(values) {
      const stickEl = document.getElementById("craftStick");
      const ironEl = document.getElementById("craftIron");
      const gunpowderEl = document.getElementById("craftGunpowder");
      if (stickEl && values && values[CRAFTING_KEYS.stick] != null) {
        stickEl.value = String(values[CRAFTING_KEYS.stick]);
      }
      if (ironEl && values && values[CRAFTING_KEYS.iron] != null) {
        ironEl.value = String(values[CRAFTING_KEYS.iron]);
      }
      if (gunpowderEl && values && values[CRAFTING_KEYS.gunpowder] != null) {
        gunpowderEl.value = String(values[CRAFTING_KEYS.gunpowder]);
      }
    }

    function applyInventoryDelta(values) {
      withGame(w => {
        runGameExpr(w, `(() => {
          const values = ${JSON.stringify(values)};
          if (typeof inventory === "undefined" || !inventory) return values;
          Object.keys(values).forEach((key) => {
            const delta = Number(values[key]) || 0;
            inventory[key] = (Number(inventory[key]) || 0) + delta;
          });
          return values;
        })()`);
        if (typeof w.updateInventoryUI === "function") w.updateInventoryUI();
      });
    }

    function applyInventorySet(values) {
      withGame(w => {
        runGameExpr(w, `(() => {
          const values = ${JSON.stringify(values)};
          if (typeof inventory === "undefined" || !inventory) return values;
          Object.keys(values).forEach((key) => {
            const nextValue = Math.max(${CRAFTING_MIN_COUNT}, Number(values[key]) || 0);
            inventory[key] = nextValue;
          });
          return values;
        })()`);
        if (typeof w.updateInventoryUI === "function") w.updateInventoryUI();
      });
    }

    function injectCraftPreset(presetKey) {
      const preset = CRAFTING_PRESETS[presetKey];
      if (!preset) return;
      const multiplier = readCraftMultiplier();
      const values = {};
      Object.keys(preset).forEach((key) => {
        values[key] = preset[key] * multiplier;
      });
      applyInventoryDelta(values);
    }

    function clearCraftInventory() {
      const values = {
        [CRAFTING_KEYS.stick]: 0,
        [CRAFTING_KEYS.iron]: 0,
        [CRAFTING_KEYS.gunpowder]: 0
      };
      setCraftInventoryInputs(values);
      applyInventorySet(values);
    }

    function setCraftInventoryFromInputs() {
      const values = getCraftInventoryInputs();
      applyInventorySet(values);
    }

    function openCraftingModal() {
      ensureRunning();
      withGame(w => {
        runGameExpr(w, `(() => {
          if (typeof showCraftingModal === "function") {
            showCraftingModal();
            return true;
          }
          return false;
        })()`);
      });
    }

    function autoFillCrafting(recipeKey) {
      const key = recipeKey ? String(recipeKey) : "";
      openCraftingModal();
      withGame(w => {
        runGameExpr(w, `(() => {
          const recipeKey = ${JSON.stringify(key)};
          if (recipeKey && typeof selectCraftRecipe === "function") {
            selectCraftRecipe(recipeKey);
          }
          if (typeof autoFillCraftingSelection === "function") {
            autoFillCraftingSelection();
            return true;
          }
          return false;
        })()`);
      });
    }

    function renderStatus(w) {
      if (!w) {
        if (!iframeLoaded) {
          statusEl.innerText = "status: game iframe loading...";
          return;
        }
        if (iframeAccessError) {
          statusEl.innerText =
            "status: iframe loaded but inaccessible (cross-origin/preview sandbox).\n" +
            "请用本地 HTTP 打开: http://localhost:4173/tests/debug-pages/GameDebug.html";
          return;
        }
        statusEl.innerText =
          "status: iframe loaded, waiting game globals...\n" +
          "如果长时间不变，请用本地 HTTP 打开（不要用 IDE 预览/file://）。";
        return;
      }
      const biomeId = readGameExpr(w, 'typeof currentBiome !== "undefined" ? currentBiome : null', w.currentBiome || "n/a") || "n/a";
      const scoreValue = Number(readGameExpr(w, 'typeof score !== "undefined" ? score : 0', w.score || 0)) || 0;
      const runBestScoreValue = Number(readGameExpr(w, 'typeof runBestScore !== "undefined" ? runBestScore : 0', w.runBestScore || 0)) || 0;
      const enemyCount = Number(readGameExpr(w, 'Array.isArray(enemies) ? enemies.length : 0', Array.isArray(w.enemies) ? w.enemies.length : 0)) || 0;
      const dragonCount = Number(readGameExpr(w, 'Array.isArray(dragonList) ? dragonList.length : 0', Array.isArray(w.dragonList) ? w.dragonList.length : 0)) || 0;
      const ridingDragon = Boolean(readGameExpr(w, '!!ridingDragon', Boolean(w.ridingDragon)));
      const equippedConsumableKey = readGameExpr(w, 'equippedConsumable && equippedConsumable.itemKey ? equippedConsumable.itemKey : null', w.equippedConsumable && w.equippedConsumable.itemKey ? w.equippedConsumable.itemKey : null) || '-';
      const equippedConsumableCount = Number(readGameExpr(w, 'equippedConsumable && equippedConsumable.count ? equippedConsumable.count : 0', w.equippedConsumable && w.equippedConsumable.count ? w.equippedConsumable.count : 0)) || 0;
      const stay = typeof w.getBiomeStayDebugInfo === "function"
        ? w.getBiomeStayDebugInfo(scoreValue)
        : null;
      const rounds = typeof w.getBiomeVisitCountSnapshot === "function"
        ? w.getBiomeVisitCountSnapshot()
        : null;
      const boss = w.bossArena && w.bossArena.boss ? w.bossArena.boss : null;
      const bossName = boss && boss.name ? boss.name : "-";
      const bossPhase = boss && boss.phase ? boss.phase : "-";
      const bossEnvironment = w.bossArena && w.bossArena.environmentController && typeof w.bossArena.environmentController.getSnapshot === "function"
        ? w.bossArena.environmentController.getSnapshot()
        : null;
      const bossEnvironmentLabel = bossEnvironment ? (bossEnvironment.label || bossEnvironment.environmentId || "-") : "-";
      const bossEnvironmentTheme = bossEnvironment ? (bossEnvironment.theme || "neutral") : "neutral";
      const bossEnvironmentIntensity = bossEnvironment ? (Number(bossEnvironment.intensity) || 0) : 0;
      const bossEnvironmentHazardCount = bossEnvironment ? (Number(bossEnvironment.hazardCount) || 0) : 0;
      const bossEnvironmentStrength = bossEnvironment ? (Number(bossEnvironment.visualStrength) || 0) : 0;

      statusEl.innerText =
        "biome=" + biomeId +
        "  score=" + scoreValue +
        "  runBestScore=" + runBestScoreValue +
        "  enemies=" + enemyCount +
        "  dragons=" + dragonCount +
        "  ridingDragon=" + ridingDragon + "\n" +
        "consumable: equipped=" + equippedConsumableKey +
        "  count=" + equippedConsumableCount + "\n" +
        "stay: scoreInBiome=" + (stay ? Math.floor(stay.scoreInBiome) : "n/a") +
        "  timeInBiomeSec=" + (stay ? Math.floor(stay.timeInBiomeSec) : "n/a") +
        "  minScore=" + (stay ? stay.minScore : "n/a") +
        "  minTimeSec=" + (stay ? stay.minTimeSec : "n/a") +
        "  canLeave=" + (stay ? stay.canLeave : "n/a") + "\n" +
        "boss: active=" + Boolean(w.bossArena && w.bossArena.active) +
        "  locked=" + Boolean(w.bossArena && w.bossArena.viewportLocked) +
        "  name=" + bossName +
        "  phase=" + bossPhase + "\n" +
        "env: active=" + Boolean(bossEnvironment && bossEnvironment.active) +
        "  label=" + bossEnvironmentLabel +
        "  theme=" + bossEnvironmentTheme +
        "  intensity=" + bossEnvironmentIntensity +
        "  hazards=" + bossEnvironmentHazardCount +
        "  strength=" + bossEnvironmentStrength.toFixed(2) + "\n" +
        "biomeVisitCount=" + (rounds ? JSON.stringify(rounds) : "n/a");
    }

    loadFreshGameFrame();

    function withGame(fn) {
      const w = gw();
      if (!w) {
        renderStatus(null);
        return;
      }
      try { fn(w); } catch (e) { console.error(e); }
      renderStatus(w);
    }

    function ensureRunning() {
      withGame(w => {
        try {
          if (typeof w.bootGameLoopIfNeeded === "function") w.bootGameLoopIfNeeded();
          if (typeof w.resumeGameFromOverlay === "function") w.resumeGameFromOverlay();
          if (typeof w.setOverlay === "function") w.setOverlay(false);
          if (typeof w.paused !== "undefined") w.paused = false;
          if (typeof w.pauseStack === "number") w.pauseStack = 0;
        } catch (e) {
          console.warn("ensureRunning failed:", e);
        }
      });
    }

    function patchGodMode(w) {
      if (!w || typeof w.damagePlayer !== "function") return;
      const currentDamagePlayer = w.damagePlayer;
      if (currentDamagePlayer && currentDamagePlayer.__mmdbgGodPatched) return;
      const raw = currentDamagePlayer;
      function debugDamagePlayerPatched() {
        if (debugGodMode) return;
        return raw.apply(this, arguments);
      }
      debugDamagePlayerPatched.__mmdbgGodPatched = true;
      debugDamagePlayerPatched.__mmdbgRaw = raw;
      w.damagePlayer = debugDamagePlayerPatched;
    }

    function syncDragonProjectileCrystals(w) {
      if (!w || !w.endDragonArena) return;
      w.endDragonArena.projectileCrystalsEnabled = dragonProjectileCrystalsEnabled;
    }

    function setBiome() {
      const biomeId = document.getElementById("biome").value;
      withGame(w => {
        patchGodMode(w);
        runGameExpr(w, `(() => {
          const biomeId = ${JSON.stringify(biomeId)};
          const unlockScore = Number(typeof getBiomeSwitchConfig === "function"
            ? (getBiomeSwitchConfig().unlockScore?.[biomeId] ?? 0)
            : 0);
          score = Math.max(Number(score) || 0, unlockScore);
          runBestScore = Math.max(Number(runBestScore) || 0, unlockScore);
          const nextBiome = typeof getBiomeById === "function" ? getBiomeById(biomeId) : null;
          const progressScore = Math.max(
            typeof getProgressScore === "function" ? (Number(getProgressScore()) || 0) : (Number(score) || 0),
            unlockScore
          );
          if (nextBiome && typeof applyBiomeTransition === "function") {
            applyBiomeTransition(nextBiome, progressScore, typeof hasHeatProtection === "function" ? hasHeatProtection() : false);
          } else {
            currentBiome = biomeId;
            if (nextBiome && typeof updateWeatherForBiome === "function") {
              updateWeatherForBiome(nextBiome);
            }
          }
          const info = document.getElementById("level-info");
          if (info && nextBiome && nextBiome.name) info.innerText = '生态: ' + nextBiome.name;
          return currentBiome;
        })()`);
      });
    }

    function setBiomeRound() {
      const biomeId = document.getElementById("biome").value;
      const roundValue = Math.max(1, Number(document.getElementById("biomeRound").value) || 1);
      withGame(w => {
        if (typeof w.setBiomeVisitRound === "function") {
          w.setBiomeVisitRound(biomeId, roundValue);
        } else if (typeof w.getBiomeVisitCountSnapshot === "function") {
          // fallback: 尝试通过切换多次群系累积轮次
          const rounds = w.getBiomeVisitCountSnapshot();
          if (!rounds[biomeId]) rounds[biomeId] = 1;
        }
      });
    }

    function setScore() {
      const s = Math.max(0, Number(document.getElementById("score").value) || 0);
      withGame(w => {
        patchGodMode(w);
        runGameExpr(w, `(() => {
          score = ${s};
          runBestScore = Math.max(Number(runBestScore) || 0, ${s});
          const el = document.getElementById("score");
          if (el) el.innerText = String(score);
          if (typeof updateCurrentBiome === "function") updateCurrentBiome();
          return score;
        })()`);
      });
    }

    function getSelectedBiomeId() {
      const el = document.getElementById("biome");
      return el && el.value ? String(el.value) : "forest";
    }

    function getOrderedBiomeIds() {
      return Array.from(document.querySelectorAll("#biome option")).map(option => String(option.value || option.textContent || "").trim()).filter(Boolean);
    }

    function getNextBiomeId(fromBiomeId) {
      const biomeIds = getOrderedBiomeIds();
      const index = biomeIds.indexOf(String(fromBiomeId || ""));
      if (index === -1) return fromBiomeId || "forest";
      return biomeIds[(index + 1) % biomeIds.length] || fromBiomeId || "forest";
    }

    function syncSelectedBiomeIntoGame() {
      setBiome();
      return getSelectedBiomeId();
    }

    function enterDragonArenaDebug() {
      ensureRunning();
      const biomeEl = document.getElementById("biome");
      if (biomeEl) biomeEl.value = "end";
      withGame(w => {
        patchGodMode(w);
        if (w.bossArena && w.bossArena.active && typeof w.bossArena.exit === "function") {
          w.bossArena.exit();
        }
        if (w.endDragonArena && typeof w.endDragonArena.enter === "function") {

      withGame(w => {

        const fallback = { en: "adventure", zh: "冒险" };
        let wordObj = fallback;
        let forcedType = "fill_blank";

          wordObj = db.find(item => item && item.en && item.en.length >= 12) || { en: "environment", zh: "环境" };

          wordObj = db.find(item => item && item.en && item.en.length >= 6) || { en: "minecraft", zh: "我的世界" };
          forcedType = "multi_blank";

          dragonObjectiveLabel: dragonArena && dragonArena.active && dragonArena.objectiveLabel ? dragonArena.objectiveLabel : '',
          dragonStatusLabel: dragonArena && dragonArena.active && dragonArena.statusLabel ? dragonArena.statusLabel : '',
          dragonProjectileCrystalsEnabled: dragonArena && typeof dragonArena.projectileCrystalsEnabled !== "undefined"
            ? Boolean(dragonArena.projectileCrystalsEnabled)
            : dragonProjectileCrystalsEnabled,
          dragonBannerText: dragonArena && dragonArena.active && dragonArena.bannerText ? dragonArena.bannerText : '',
          dragonPhasePulse: dragonArena && dragonArena.active ? Number(dragonArena.phasePulse) || 0 : 0,
          dragonDamageFlash: dragonArena && dragonArena.active ? Number(dragonArena.damageFlash) || 0 : 0,
          dragonPortalPulse: dragonArena && dragonArena.active ? Number(dragonArena.portalPulse) || 0 : 0,
          ridingDragon: Boolean(w.ridingDragon),
          equippedConsumable: w.equippedConsumable && w.equippedConsumable.itemKey ? w.equippedConsumable.itemKey : null,
          stay
        };
      }
    };

    setInterval(() => {
      const w = gw();
      if (w) patchGodMode(w);
      renderStatus(w);
    }, 500);
  </script>
</body>
</html>
