<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Minecraft - Launcher Reset</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at top, rgba(94, 180, 106, 0.35), transparent 42%),
                linear-gradient(160deg, #0d1b14, #15281b 55%, #09110c);
            color: #f4ffe9;
        }

        .panel {
            width: min(92vw, 520px);
            padding: 28px 24px;
            border: 1px solid rgba(214, 255, 203, 0.2);
            border-radius: 20px;
            background: rgba(10, 16, 12, 0.88);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 24px;
        }

        p {
            margin: 0 0 10px;
            line-height: 1.6;
            color: #d6f6c8;
        }

        .hint {
            color: #a3c09a;
            font-size: 14px;
        }

        .actions {
            margin-top: 18px;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, #76d17e, #4ea856);
            color: #102014;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="panel">
        <h1>正在刷新本地游戏资源</h1>
        <p id="status">正在清理旧缓存和 Service Worker...</p>
        <p class="hint">如果几秒后没有自动进入游戏，可以点击下面的按钮手动继续。</p>
        <div class="actions">
            <a id="continue-link" href="/Game.html">进入游戏</a>
        </div>
    </main>

    <script>
        (async () => {
            const statusEl = document.getElementById("status");
            const continueLink = document.getElementById("continue-link");
            const params = new URLSearchParams(window.location.search);
            const target = params.get("target") || "/Game.html";

            continueLink.href = target;

            function updateStatus(message) {
                if (statusEl) statusEl.textContent = message;
            }

            try {
                if ("serviceWorker" in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map((registration) => registration.unregister()));
                }

                if ("caches" in window) {
                    const keys = await caches.keys();
                    await Promise.all(keys.map((key) => caches.delete(key)));
                }

                updateStatus("清理完成，正在进入游戏...");
                window.setTimeout(() => {
                    window.location.replace(target);
                }, 120);
            } catch (error) {
                console.error("[LauncherReset] cleanup failed", error);
                updateStatus(`清理时遇到问题：${error && error.message ? error.message : error}`);
            }
        })();
    </script>
</body>
</html>
